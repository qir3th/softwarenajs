<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f0f13;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}
.topbar{background:#1a1a22;border-bottom:1px solid #2a2a35;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar h1{font-size:18px;font-weight:700;color:#fff;}
.topbar h1 span{color:#6c63ff;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.role-badge{font-size:11px;background:#1e1a3a;color:#9d97ff;padding:4px 10px;border-radius:20px;border:1px solid #3a3560;}
.btn-sm{background:none;border:1px solid #2a2a35;color:#aaa;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:all 0.2s;}
.btn-sm:hover{border-color:#6c63ff;color:#fff;}
.btn-sm.primary{background:#6c63ff;border-color:#6c63ff;color:#fff;}
.btn-sm.primary:hover{background:#5a52e0;}
.btn-sm.danger{border-color:#5c2020;color:#e07070;}
.btn-sm.danger:hover{background:#2a1515;border-color:#e05c5c;}
.main{max-width:900px;margin:0 auto;padding:24px 16px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.section-title{font-size:16px;font-weight:600;color:#fff;}
.section-count{font-size:13px;color:#666;margin-left:8px;}
.empty{text-align:center;padding:60px 20px;color:#555;}
.empty i{font-size:40px;margin-bottom:12px;display:block;}
.empty p{font-size:15px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
.card-item{background:#1a1a22;border:1px solid #2a2a35;border-radius:14px;padding:18px;transition:border-color 0.2s;}
.card-item:hover{border-color:#3a3a55;}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.card-avatar{width:42px;height:42px;border-radius:50%;background:#1e1a3a;border:1px solid #3a3560;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#9d97ff;flex-shrink:0;}
.card-name{font-size:15px;font-weight:600;color:#fff;line-height:1.3;}
.card-id{font-size:11px;color:#555;margin-top:2px;}
.card-info{font-size:12px;color:#666;margin-bottom:14px;}
.card-info span{color:#aaa;}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;}
.card-actions button{flex:1;min-width:70px;padding:8px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #2a2a35;background:none;color:#aaa;transition:all 0.2s;}
.card-actions button:hover{background:#23232f;color:#fff;}
.card-actions button.copy-btn:hover{border-color:#6c63ff;color:#9d97ff;}
.card-actions button.edit-btn:hover{border-color:#63a8ff;color:#63a8ff;}
.card-actions button.del-btn:hover{border-color:#e05c5c;color:#e07070;background:#1a0f0f;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a22;border:1px solid #2a2a35;border-radius:10px;padding:12px 20px;font-size:13px;color:#fff;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.ok{border-color:#1D9E75;color:#5DCAA5;}
.toast.err{border-color:#e05c5c;color:#e07070;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#1a1a22;border:1px solid #2a2a35;border-radius:16px;padding:28px;max-width:360px;width:100%;}
.modal h2{font-size:16px;font-weight:600;margin-bottom:10px;}
.modal p{font-size:13px;color:#888;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;}
.modal-btns button{flex:1;padding:11px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;}
.modal-btns .cancel{background:#23232f;color:#aaa;}
.modal-btns .confirm{background:#c0392b;color:#fff;}
.admin-link{display:flex;align-items:center;gap:6px;font-size:13px;color:#9d97ff;cursor:pointer;padding:7px 12px;border-radius:8px;border:1px solid #3a3560;background:#1e1a3a;transition:all 0.2s;}
.admin-link:hover{background:#2a2450;}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar h1">m<span style="color:#6c63ff">Obywatel</span> &nbsp;<span style="color:#555;font-weight:400;font-size:14px">Panel</span></div>
  </div>
  <div class="topbar-right">
    <span class="role-badge" id="role-badge">użytkownik</span>
    <div class="admin-link" id="admin-link" style="display:none" onclick="location.href='/admin'">⚙ Admin</div>
    <button class="btn-sm primary" onclick="location.href='/generator'">+ Nowa karta</button>
    <button class="btn-sm" onclick="doLogout()">Wyloguj</button>
  </div>
</div>

<div class="main">
  <div class="section-header">
    <div>
      <span class="section-title">Wygenerowane karty</span>
      <span class="section-count" id="count"></span>
    </div>
  </div>
  <div id="empty" class="empty" style="display:none">
    <i>🪪</i>
    <p>Brak kart. Kliknij „+ Nowa karta" żeby dodać pierwszą.</p>
  </div>
  <div class="cards-grid" id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h2>Usuń kartę</h2>
    <p>Jesteś pewien że chcesz usunąć tę kartę? Tej operacji nie można cofnąć.</p>
    <div class="modal-btns">
      <button class="cancel" onclick="closeModal()">Anuluj</button>
      <button class="confirm" onclick="confirmDelete()">Usuń</button>
    </div>
  </div>
</div>

<script>
var session = localStorage.getItem('session');
var deleteId = null;

if (!session) { location.href = '/login'; }

fetch('/api/me',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session})})
.then(r=>r.json()).then(d=>{
  if(!d.ok){localStorage.removeItem('session');location.href='/login';}
});

fetch('/api/cards',{method:'POST',headers:{'Content-Type':'application/json','x-session':session},body:JSON.stringify({session})})
.then(r=>r.json()).then(d=>{
  if(!d.ok){location.href='/login';return;}
  if(d.isAdmin){
    document.getElementById('admin-link').style.display='flex';
    document.getElementById('role-badge').textContent='admin';
  }
  document.getElementById('count').textContent = '(' + d.cards.length + ')';
  if(d.cards.length===0){document.getElementById('empty').style.display='block';return;}
  var grid = document.getElementById('grid');
  d.cards.forEach(c=>{
    var initials = ((c.name||'?')[0]+(c.surname||'?')[0]).toUpperCase();
    var dob = pad(c.day)+'.'+pad(c.month)+'.'+c.year;
    var el = document.createElement('div');
    el.className='card-item'; el.id='card-'+c.id;
    el.innerHTML=
      '<div class="card-top">'+
      '<div class="card-avatar">'+initials+'</div>'+
      '<div><div class="card-name">'+esc(c.name)+' '+esc(c.surname)+'</div>'+
      '<div class="card-id">ID #'+c.id+'</div></div>'+
      '</div>'+
      '<div class="card-info">Data ur.: <span>'+dob+'</span></div>'+
      '<div class="card-actions">'+
      '<button class="copy-btn" onclick="copyLink(\''+c.token+'\')">📋 Kopiuj link</button>'+
      '<button class="edit-btn" onclick="location.href=\'/generator?id='+c.id+'\'">✏ Edytuj</button>'+
      '<button class="del-btn" onclick="askDelete('+c.id+')">🗑 Usuń</button>'+
      '</div>';
    grid.appendChild(el);
  });
});

function pad(n){return String(n).padStart(2,'0');}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function copyLink(token){
  navigator.clipboard.writeText(location.protocol+'//'+location.host+'/id?card_token='+token)
  .then(()=>toast('Link skopiowany!','ok'))
  .catch(()=>toast('Błąd kopiowania','err'));
}

function askDelete(id){deleteId=id;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');deleteId=null;}
function confirmDelete(){
  if(!deleteId)return;
  fetch('/api/delete-card',{method:'POST',headers:{'Content-Type':'application/json','x-session':session},body:JSON.stringify({session,id:deleteId})})
  .then(r=>r.json()).then(d=>{
    if(d.ok){var el=document.getElementById('card-'+deleteId);if(el)el.remove();toast('Karta usunięta','ok');}
    else toast('Błąd usuwania','err');
    closeModal();
  });
}

function doLogout(){
  fetch('/api/logout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session})});
  localStorage.removeItem('session');localStorage.removeItem('role');
  location.href='/login';
}

function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
