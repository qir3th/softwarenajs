<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logowanie — mObywatel Panel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --surface2: #14141f;
  --border: #1e1e2e;
  --border2: #252535;
  --accent: #6c63ff;
  --accent2: #5a52e0;
  --accent3: #4a43cc;
  --accent-glow: rgba(108,99,255,0.18);
  --text: #e8e8f0;
  --text2: #9090a8;
  --text3: #55556a;
  --red: #e05c5c;
  --red-bg: rgba(224,92,92,0.1);
  --green: #4ade80;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height: 100vh;
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  padding: 16px;
  position: relative;
  overflow: hidden;
}
/* Background grid */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
/* Glow blob */
body::after {
  content:'';
  position:fixed;
  top:-20%; left:50%;
  transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse at center, rgba(108,99,255,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 36px 28px;
  width: 100%;
  max-width: 420px;
  position: relative;
  box-shadow: 0 0 0 1px rgba(108,99,255,0.06), 0 32px 80px rgba(0,0,0,0.6);
  animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes slideUp {
  from { opacity:0; transform: translateY(24px); }
  to { opacity:1; transform: translateY(0); }
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 14px;
  font-size: 22px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(108,99,255,0.35);
}
.logo h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.3px;
}
.logo h1 span { color: var(--accent); }
.logo p {
  font-size: 13px;
  color: var(--text3);
  margin-top: 5px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text3);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 11px;
  padding: 14px 16px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  -webkit-border-radius: 11px;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.field input.err {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(224,92,92,0.1);
}
.field input::placeholder { color: var(--text3); }
.btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), #7c74ff);
  color: #fff;
  border: none;
  border-radius: 11px;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-top: 8px;
  transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  letter-spacing: 0.2px;
  min-height: 52px;
}
.btn:hover { opacity: 0.9; box-shadow: 0 6px 28px rgba(108,99,255,0.4); }
.btn:active { transform: scale(0.99); }
.btn:disabled {
  background: var(--surface2);
  box-shadow: none;
  cursor: not-allowed;
  color: var(--text3);
}
.error {
  background: var(--red-bg);
  border: 1px solid rgba(224,92,92,0.3);
  border-radius: 10px;
  padding: 12px 15px;
  font-size: 13px;
  color: #f08080;
  margin-bottom: 18px;
  display: none;
  animation: shake 0.3s ease;
}
.error.show { display: block; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}
.footer-text {
  text-align: center;
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}
/* Loading spinner in btn */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile optimizations */
@media (max-width: 480px) {
  body {
    padding: 12px;
    align-items: flex-start;
    padding-top: 24px;
  }
  .card {
    padding: 28px 20px;
    border-radius: 16px;
  }
  .logo {
    margin-bottom: 24px;
  }
  .logo-mark {
    width: 48px;
    height: 48px;
    font-size: 20px;
    margin-bottom: 12px;
  }
  .logo h1 {
    font-size: 18px;
  }
  .logo p {
    font-size: 12px;
  }
  .field {
    margin-bottom: 14px;
  }
  .field input {
    padding: 14px 14px;
    font-size: 16px;
    min-height: 50px;
  }
  .btn {
    padding: 14px;
    font-size: 15px;
    min-height: 50px;
    margin-top: 6px;
  }
  .error {
    font-size: 12px;
    padding: 10px 12px;
  }
  .divider {
    margin: 20px 0;
  }
  .footer-text {
    font-size: 10px;
  }
}

/* Very small screens */
@media (max-width: 360px) {
  .card {
    padding: 24px 16px;
  }
  .logo-mark {
    width: 44px;
    height: 44px;
    font-size: 18px;
  }
}

/* Landscape mobile */
@media (max-height: 500px) and (orientation: landscape) {
  body {
    align-items: center;
    padding-top: 12px;
  }
  .card {
    padding: 20px 24px;
  }
  .logo {
    margin-bottom: 16px;
  }
  .logo-mark {
    width: 40px;
    height: 40px;
    font-size: 18px;
    margin-bottom: 10px;
  }
  .logo h1 {
    font-size: 16px;
  }
  .field {
    margin-bottom: 10px;
  }
  .field input {
    padding: 10px 12px;
  }
  .btn {
    padding: 12px;
    min-height: 44px;
  }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">🪪</div>
    <h1>m<span>Obywatel</span></h1>
    <p>PANEL ZARZĄDZANIA</p>
  </div>
  <div class="error" id="err"></div>
  <div class="field">
    <label>Login</label>
    <input type="text" id="login" placeholder="Wpisz login" autocomplete="username">
  </div>
  <div class="field">
    <label>Hasło</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn" id="btn" onclick="doLogin()">Zaloguj się</button>
  <div class="divider"></div>
  <div class="footer-text">Bezpieczne połączenie · SSL</div>
</div>
<script>
var loginInput = document.getElementById('login');
var passInput = document.getElementById('password');
var errBox = document.getElementById('err');
var btn = document.getElementById('btn');

var sess = localStorage.getItem('session');
if (sess) {
  fetch('/api/me', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:sess})})
  .then(r=>r.json()).then(d=>{if(d.ok) location.href='/dashboard';});
}

[loginInput, passInput].forEach(el => {
  el.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  el.addEventListener('input', () => { el.classList.remove('err'); errBox.classList.remove('show'); });
});

function doLogin(){
  var login = loginInput.value.trim();
  var pass = passInput.value;
  if(!login){loginInput.classList.add('err');return;}
  if(!pass){passInput.classList.add('err');return;}
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logowanie...';
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password:pass})})
  .then(r=>r.json())
  .then(d=>{
    btn.disabled=false; btn.innerHTML='Zaloguj się';
    if(d.ok){
      localStorage.setItem('session', d.token);
      localStorage.setItem('role', d.role);
      location.href='/dashboard';
    } else {
      errBox.textContent = d.error || 'Błąd logowania';
      errBox.classList.add('show');
    }
  })
  .catch(()=>{btn.disabled=false;btn.innerHTML='Zaloguj się';errBox.textContent='Błąd połączenia z serwerem';errBox.classList.add('show');});
}
</script>
</body>
</html>
